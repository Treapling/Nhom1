<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMS Quản trị - Tour Guide App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f4f6f9;
      }
      .navbar {
        background-color: #343a40;
      }
      .navbar-brand {
        color: white !important;
        font-weight: bold;
      }
      .card {
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        border: none;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg mb-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">⚙️ Hệ thống Quản trị POI & Audio</a>
      </div>
    </nav>

    <div class="container">
      <div class="row">
        <div class="col-md-4">
          <div class="card p-3 mb-4">
            <h5>Thêm Điểm tham quan mới</h5>
            <hr />
            <form id="poiForm">
              <div class="mb-2">
                <label class="form-label">Tên địa điểm</label>
                <input type="text" class="form-control" id="name" required />
              </div>
              <div class="mb-2">
                <label class="form-label">Mô tả ngắn</label>
                <textarea
                  class="form-control"
                  id="description"
                  rows="2"
                ></textarea>
              </div>
              <div class="row">
                <div class="col-6 mb-2">
                  <label class="form-label">Vĩ độ (Lat)</label>
                  <input
                    type="number"
                    step="any"
                    class="form-control"
                    id="lat"
                    required
                  />
                </div>
                <div class="col-6 mb-2">
                  <label class="form-label">Kinh độ (Lng)</label>
                  <input
                    type="number"
                    step="any"
                    class="form-control"
                    id="lng"
                    required
                  />
                </div>
              </div>
              <div class="row">
                <div class="col-6 mb-3">
                  <label class="form-label">Bán kính (m)</label>
                  <input
                    type="number"
                    class="form-control"
                    id="radius"
                    value="100"
                    required
                  />
                </div>
                <div class="col-6 mb-3">
                  <label class="form-label">Mức ưu tiên</label>
                  <input
                    type="number"
                    class="form-control"
                    id="priority"
                    value="1"
                    required
                  />
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100">
                Lưu dữ liệu
              </button>
            </form>
          </div>

          <div class="card p-3 mb-4">
            <h5>Thêm File Âm Thanh (Audio)</h5>
            <hr />
            <form id="audioForm">
              <div class="mb-2">
                <label class="form-label">Mã địa điểm (POI ID)</label>
                <input type="number" class="form-control" id="audioPoiId" required placeholder="Ví dụ: 1" />
              </div>
              <div class="mb-2">
                <label class="form-label">Đường dẫn file (FilePath)</label>
                <input type="text" class="form-control" id="audioFilePath" required placeholder="https://example.com/audio.mp3" />
              </div>
              <div class="mb-3">
                <label class="form-label">Ngôn ngữ</label>
                <select class="form-select" id="audioLanguage">
                  <option value="vi">Tiếng Việt (vi)</option>
                  <option value="en">Tiếng Anh (en)</option>
                </select>
              </div>
              <button type="submit" class="btn btn-success w-100">
                Lưu Âm Thanh
              </button>
            </form>
          </div>
        </div>

        <div class="col-md-8">
          <div class="card p-3">
            <h5>Danh sách Điểm tham quan</h5>
            <hr />
            <table class="table table-hover">
              <thead class="table-dark">
                <tr>
                  <th>ID</th>
                  <th>Tên địa điểm</th>
                  <th>Tọa độ (Lat, Lng)</th>
                  <th>Bán kính</th>
                  <th>Danh sách Audio</th>
                  <th>Hành động</th>
                </tr>
              </thead>
              <tbody id="poiTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_URL = "http://localhost:5555/api/POI";
      const AUDIO_API_URL = "http://localhost:5555/api/Audio";

      // Hàm load danh sách POI từ Database (Cập nhật hiển thị thêm list audio đi kèm)
      function loadPOIs() {
        fetch(API_URL)
          .then((res) => res.json())
          .then((data) => {
            const tbody = document.getElementById("poiTableBody");
            tbody.innerHTML = ""; // Xóa dữ liệu cũ
            data.forEach((poi) => {
              
              // Tạo chuỗi HTML để liệt kê danh sách file Audio của POI này
              let audioListHtml = "";
              if (poi.audios && poi.audios.length > 0) {
                audioListHtml = poi.audios.map(a => 
                  `<div class="small mb-1">
                    <span class="badge bg-secondary">${a.language.toUpperCase()}</span> 
                    <a href="${a.filePath}" target="_blank" class="text-truncate d-inline-block" style="max-width: 150px;">Link</a>
                    <button class="btn btn-sm text-danger p-0 ms-1" style="font-size: 11px;" onclick="deleteAudio(${a.id})">[Xóa]</button>
                   </div>`
                ).join("");
              } else {
                audioListHtml = '<span class="text-muted small">Chưa có audio</span>';
              }

              tbody.innerHTML += `
                        <tr>
                            <td>${poi.id}</td>
                            <td><strong>${poi.name}</strong></td>
                            <td>${poi.lat}, ${poi.lng}</td>
                            <td>${poi.radius}m</td>
                            <td>${audioListHtml}</td>
                            <td>
                                <button class="btn btn-sm btn-danger" onclick="deletePOI(${poi.id})">Xóa POI</button>
                            </td>
                        </tr>
                    `;
            });
          });
      }

      // Hàm Thêm mới POI
      document
        .getElementById("poiForm")
        .addEventListener("submit", function (e) {
          e.preventDefault(); // Ngăn trình duyệt load lại trang

          const newPOI = {
            name: document.getElementById("name").value,
            description: document.getElementById("description").value,
            lat: parseFloat(document.getElementById("lat").value),
            lng: parseFloat(document.getElementById("lng").value),
            radius: parseFloat(document.getElementById("radius").value),
            priority: parseInt(document.getElementById("priority").value),
          };

          fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(newPOI),
          }).then((res) => {
            if (res.ok) {
              alert("Thêm địa điểm thành công!");
              document.getElementById("poiForm").reset(); // Xóa trắng form
              loadPOIs(); // Cập nhật lại bảng
            }
          });
        });

      // Hàm Thêm mới Audio gán cho POI
      document
        .getElementById("audioForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const newAudio = {
            POI_Id: parseInt(document.getElementById("audioPoiId").value),
            FilePath: document.getElementById("audioFilePath").value,
            Language: document.getElementById("audioLanguage").value
          };

          fetch(AUDIO_API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(newAudio)
          }).then((res) => {
            if (res.ok) {
              alert("Thêm file âm thanh thành công!");
              document.getElementById("audioForm").reset();
              loadPOIs(); // Load lại bảng để xem audio mới gán
            } else {
              res.text().then(text => alert("Lỗi: " + text));
            }
          }).catch(err => console.error("Lỗi gửi dữ liệu:", err));
        });

      // Hàm Xóa POI
      function deletePOI(id) {
        if (confirm("Bạn có chắc chắn muốn xóa điểm này? (Tất cả audio đính kèm sẽ bị xóa tự động)")) {
          fetch(`${API_URL}/${id}`, { method: "DELETE" }).then((res) => {
            if (res.ok) {
              loadPOIs(); // Cập nhật lại bảng
            }
          });
        }
      }

      // Hàm Xóa lẻ từng Audio
      function deleteAudio(audioId) {
        if (confirm("Bạn có chắc chắn muốn xóa file âm thanh này không?")) {
          fetch(`${AUDIO_API_URL}/${audioId}`, { method: "DELETE" }).then((res) => {
            if (res.ok) {
              alert("Xóa file âm thanh thành công!");
              loadPOIs(); // Cập nhật lại giao diện
            }
          });
        }
      }

      // Chạy hàm load dữ liệu ngay khi mở trang
      loadPOIs();
    </script>
  </body>
</html>
