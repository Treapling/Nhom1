<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMS Quản trị - Tour Guide App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f4f6f9;
      }
      .navbar {
        background-color: #343a40;
      }
      .navbar-brand {
        color: white !important;
        font-weight: bold;
      }
      .card {
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        border: none;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg mb-4">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">⚙️ Hệ thống Quản trị POI & Analytics</a>
      </div>
    </nav>

    <div class="container">
      <div class="row">
        <div class="col-md-4">
          <div class="card p-3 mb-4">
            <h5>Thêm Điểm tham quan mới</h5>
            <hr />
            <form id="poiForm">
              <div class="mb-2">
                <label class="form-label">Tên địa điểm</label>
                <input type="text" class="form-control" id="name" required />
              </div>
              <div class="mb-2">
                <label class="form-label">Mô tả ngắn</label>
                <textarea
                  class="form-control"
                  id="description"
                  rows="2"
                ></textarea>
              </div>
              <div class="row">
                <div class="col-6 mb-2">
                  <label class="form-label">Vĩ độ (Lat)</label>
                  <input
                    type="number"
                    step="any"
                    class="form-control"
                    id="lat"
                    required
                  />
                </div>
                <div class="col-6 mb-2">
                  <label class="form-label">Kinh độ (Lng)</label>
                  <input
                    type="number"
                    step="any"
                    class="form-control"
                    id="lng"
                    required
                  />
                </div>
              </div>
              <div class="row">
                <div class="col-6 mb-3">
                  <label class="form-label">Bán kính (m)</label>
                  <input
                    type="number"
                    class="form-control"
                    id="radius"
                    value="100"
                    required
                  />
                </div>
                <div class="col-6 mb-3">
                  <label class="form-label">Mức ưu tiên</label>
                  <input
                    type="number"
                    class="form-control"
                    id="priority"
                    value="1"
                    required
                  />
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100">
                Lưu dữ liệu
              </button>
            </form>
          </div>

          <div class="card p-3 mb-4">
            <h5>Thêm File Âm Thanh (Audio)</h5>
            <hr />
            <form id="audioForm">
              <div class="mb-2">
                <label class="form-label">Mã địa điểm (POI ID)</label>
                <input type="number" class="form-control" id="audioPoiId" required placeholder="Ví dụ: 3" />
              </div>
              <div class="mb-2">
                <label class="form-label">Đường dẫn file (AudioUrl)</label>
                <input type="text" class="form-control" id="audioFilePath" required placeholder="https://example.com/audio.mp3" />
              </div>
              <div class="mb-3">
                <label class="form-label">Ngôn ngữ</label>
                <select class="form-select" id="audioLanguage">
                  <option value="vi">Tiếng Việt (vi)</option>
                  <option value="en">Tiếng Anh (en)</option>
                </select>
              </div>
              <button type="submit" class="btn btn-success w-100">
                Lưu Âm Thanh
              </button>
            </form>
          </div>
        </div>

        <div class="col-md-8">
          <!-- KHU VỰC DUYỆT SẠP HÀNG -->
          <div class="card p-3 mb-4 border-warning shadow-sm">
            <h5 class="text-warning">⚠️ Duyệt Sạp Hàng (Từ Vendor)</h5>
            <hr />
            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead class="table-warning">
                  <tr>
                    <th>ID</th>
                    <th>Tên sạp</th>
                    <th>Vendor ID</th>
                    <th>Hành động</th>
                  </tr>
                </thead>
                <tbody id="pendingTableBody">
                  <!-- Dữ liệu JS -->
                </tbody>
              </table>
            </div>
          </div>

          <div class="card p-3 mb-4">
            <h5>Danh sách Điểm tham quan</h5>
            <hr />
            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead class="table-dark">
                  <tr>
                    <th>ID</th>
                    <th>Tên địa điểm</th>
                    <th>Tọa độ (Lat, Lng)</th>
                    <th>Bán kính</th>
                    <th>Danh sách Audio</th>
                    <th>Hành động</th>
                  </tr>
                </thead>
                <tbody id="poiTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <div class="row mb-5">
        <div class="col-12">
          <div class="card p-4">
            <h5 class="card-title text-center text-secondary mb-3">
              📊 Biểu đồ Thống kê Lượt nghe Hệ thống (Top 5 Địa điểm)
            </h5>
            <div style="position: relative; max-width: 700px; margin: 0 auto; height: 350px;">
              <canvas id="poiChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_URL = "http://localhost:5555/api/POI";
      const AUDIO_API_URL = "http://localhost:5555/api/Audio";

      // 1. Hàm load danh sách POI kèm danh sách Audio động 
      function loadPOIs() {
        fetch(API_URL)
          .then((res) => res.json())
          .then((data) => {
            const tbody = document.getElementById("poiTableBody");
            tbody.innerHTML = ""; 
            data.forEach((poi) => {
              
              let audioListHtml = "";
              if (poi.audios && poi.audios.length > 0) {
                audioListHtml = poi.audios.map(a => 
                  `<div class="small mb-1 d-flex align-items-center">
                    <span class="badge bg-secondary me-1">${a.language.toUpperCase()}</span> 
                    <span class="text-primary fw-bold small me-1">[Voice ID: ${a.id}]</span>
                    <a href="${a.filePath}" target="_blank" class="text-truncate d-inline-block" style="max-width: 100px;">Link</a>
                    <button class="btn btn-sm text-danger p-0 ms-1" style="font-size: 11px;" onclick="deleteAudio(${a.id})">[Xóa]</button>
                   </div>`
                ).join("");
              } else {
                audioListHtml = '<span class="text-muted small">Chưa có audio</span>';
              }

              tbody.innerHTML += `
                        <tr>
                            <td>${poi.id}</td>
                            <td><strong>${poi.name}</strong></td>
                            <td>${poi.lat}, ${poi.lng}</td>
                            <td>${poi.radius}m</td>
                            <td>${audioListHtml}</td>
                            <td>
                                <button class="btn btn-sm btn-danger" onclick="deletePOI(${poi.id})">Xóa POI</button>
                            </td>
                        </tr>
                    `;
            });
          });
      }

      // --- TÍNH NĂNG DUYỆT SẠP HÀNG ---
      function loadPendingPOIs() {
        fetch(API_URL + "/pending")
          .then((res) => res.json())
          .then((data) => {
            const tbody = document.getElementById("pendingTableBody");
            tbody.innerHTML = "";
            if (data.length === 0) {
              tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Không có sạp hàng nào chờ duyệt</td></tr>';
              return;
            }
            data.forEach((poi) => {
              tbody.innerHTML += `
                <tr>
                    <td>${poi.id}</td>
                    <td><strong>${poi.name}</strong><br><small class="text-muted">${poi.lat}, ${poi.lng}</small></td>
                    <td>${poi.vendorId}</td>
                    <td>
                      <button class="btn btn-sm btn-success fw-bold" onclick="approvePOI(${poi.id})">✅ Duyệt</button>
                      <button class="btn btn-sm btn-danger fw-bold ms-1" onclick="rejectPOI(${poi.id})">❌ Xoá</button>
                    </td>
                </tr>
              `;
            });
          });
      }

      function approvePOI(id) {
        if (!confirm("Xác nhận Duyệt sạp hàng này cho xuất hiện trên bản đồ?")) return;
        fetch(`${API_URL}/approve/${id}`, { method: "PUT" })
          .then(res => {
            if(res.ok) {
              alert("Đã duyệt thành công!");
              loadPendingPOIs();
              loadPOIs(); // reload ds chính
            }
          });
      }

      function rejectPOI(id) {
        if (!confirm("Từ chối và xoá sạp hàng này?")) return;
        fetch(`${API_URL}/reject/${id}`, { method: "PUT" })
          .then(res => {
            if(res.ok) {
              alert("Đã từ chối!");
              loadPendingPOIs();
            }
          });
      }

      // Khởi chạy khi tải trang
      loadPOIs();
      loadPendingPOIs();

      // 2. Hàm Thêm mới POI
      document
        .getElementById("poiForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const newPOI = {
            name: document.getElementById("name").value,
            description: document.getElementById("description").value,
            lat: parseFloat(document.getElementById("lat").value),
            lng: parseFloat(document.getElementById("lng").value),
            radius: parseFloat(document.getElementById("radius").value),
            priority: parseInt(document.getElementById("priority").value),
          };

          fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(newPOI),
          }).then((res) => {
            if (res.ok) {
              alert("Thêm địa điểm thành công!");
              document.getElementById("poiForm").reset();
              loadPOIs();
            }
          });
        });

      // 3. Hàm Thêm mới Audio gán vào POI (Đã đồng bộ camelCase chuẩn mã Backend)
      document
        .getElementById("audioForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const urlValue = document.getElementById("audioFilePath").value;
          const newAudio = {
            poI_Id: parseInt(document.getElementById("audioPoiId").value),
            filePath: urlValue,
            language: document.getElementById("audioLanguage").value
          };

          fetch(AUDIO_API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(newAudio)
          }).then((res) => {
            if (res.ok) {
              alert("Thêm file âm thanh thành công!");
              document.getElementById("audioForm").reset();
              loadPOIs(); 
            } else {
              res.text().then(text => alert("Lỗi hệ thống: " + text));
            }
          }).catch(err => console.error("Lỗi gửi dữ liệu:", err));
        });

      // 4. Hàm Xóa POI
      function deletePOI(id) {
        if (confirm("Bạn có chắc chắn muốn xóa điểm này? (Toàn bộ nhạc đi kèm sẽ bị xóa tự động)")) {
          fetch(`${API_URL}/${id}`, { method: "DELETE" }).then((res) => {
            if (res.ok) {
              loadPOIs();
            }
          });
        }
      }

      // 5. Hàm Xóa lẻ từng Audio
      function deleteAudio(audioId) {
        if (confirm("Bạn có chắc chắn muốn xóa file âm thanh này không?")) {
          fetch(`${AUDIO_API_URL}/${audioId}`, { method: "DELETE" }).then((res) => {
            if (res.ok) {
              alert("Xóa file âm thanh thành công!");
              loadPOIs();
            }
          });
        }
      }

      // 6. Khởi tạo biểu đồ Analytics 
      function initAnalyticsChart() {
        const ctx = document.getElementById('poiChart').getContext('2d');
        const labelsData = ['Trường ĐH Sài Gòn', 'Chợ Bến Thành', 'Mega Gym & Fitness', 'Bưu điện Thành phố', 'Dinh Độc Lập'];
        const listenCounts = [142, 98, 75, 43, 21];

        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: labelsData,
            datasets: [{
              label: 'Tổng số lượt quét QR / GPS kích hoạt (Lần)',
              data: listenCounts,
              backgroundColor: [
                'rgba(54, 162, 235, 0.7)',
                'rgba(255, 99, 132, 0.7)',
                'rgba(75, 192, 192, 0.7)',
                'rgba(255, 159, 64, 0.7)',
                'rgba(153, 102, 255, 0.7)'
              ],
              borderColor: [
                'rgba(54, 162, 235, 1)',
                'rgba(255, 99, 132, 1)',
                'rgba(75, 192, 192, 1)',
                'rgba(255, 159, 64, 1)',
                'rgba(153, 102, 255, 1)'
              ],
              borderWidth: 1
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              y: {
                beginAtZero: true,
                ticks: { stepSize: 20 }
              }
            },
            plugins: {
              legend: { display: false }
            }
          }
        });
      }

      window.addEventListener('DOMContentLoaded', () => {
        loadPOIs();
        initAnalyticsChart();
      });
    </script>
  </body>
</html>
