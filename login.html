<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập / Đăng ký</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body { background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-container { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .nav-tabs .nav-link { cursor: pointer; }
    </style>
</head>
<body>

<div class="auth-container">
    <h3 class="text-center mb-4">SGU Tour Guide</h3>
    
    <!-- Tabs -->
    <ul class="nav nav-tabs mb-3" id="authTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <a class="nav-link active" id="login-tab" data-bs-toggle="tab" href="#login" role="tab">Đăng nhập</a>
        </li>
        <li class="nav-item" role="presentation">
            <a class="nav-link" id="register-tab" data-bs-toggle="tab" href="#register" role="tab">Đăng ký Vendor</a>
        </li>
    </ul>

    <div class="tab-content">
        <!-- Đăng nhập -->
        <div class="tab-pane fade show active" id="login" role="tabpanel">
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Tên đăng nhập</label>
                    <input type="text" class="form-control" id="loginUsername" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" class="form-control" id="loginPassword" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Đăng Nhập</button>
            </form>
        </div>

        <!-- Đăng ký -->
        <div class="tab-pane fade" id="register" role="tabpanel">
            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label">Tên đăng nhập mới</label>
                    <input type="text" class="form-control" id="regUsername" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" class="form-control" id="regPassword" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Đăng Ký</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const u = document.getElementById('loginUsername').value;
        const p = document.getElementById('loginPassword').value;

        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: u, password: p })
        });
        
        const data = await res.json();
        if (res.ok) {
            alert("Đăng nhập thành công!");
            // Lưu thông tin để trang khác có thể kiểm tra (nếu cần sau này)
            localStorage.setItem('userRole', data.role);
            localStorage.setItem('userId', data.id);
            
            if (data.role === "Admin") window.location.href = "/admin";
            else window.location.href = "/vendor";
        } else {
            alert(data.message || "Đăng nhập thất bại");
        }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const u = document.getElementById('regUsername').value;
        const p = document.getElementById('regPassword').value;

        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: u, password: p })
        });
        
        const data = await res.json();
        if (res.ok) {
            alert("Đăng ký thành công! Hãy chuyển sang tab Đăng nhập để truy cập.");
            document.getElementById('registerForm').reset();
            document.getElementById('login-tab').click(); // Chuyển tab
        } else {
            alert(data.message || "Đăng ký thất bại");
        }
    });
</script>

</body>
</html>
