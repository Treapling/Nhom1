<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Hệ thống Thuyết minh Du lịch</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      body,
      html {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #f8f9fa;
      }
      .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-width: 500px;
        margin: 0 auto;
        background-color: white;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      }
      .header {
        background-color: #0d6efd;
        color: white;
        padding: 15px;
        text-align: center;
        font-weight: bold;
        font-size: 1.2rem;
      }
      #map-container {
        flex-grow: 1;
        width: 100%;
      }
      .control-panel {
        padding: 20px;
        background-color: white;
        border-top: 1px solid #dee2e6;
        text-align: center;
      }
      .info-box {
        background-color: #e9ecef;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 15px;
      }
      .status-text {
        font-size: 0.9rem;
        color: #6c757d;
      }
      /* Giao diện vùng quét QR ẩn/hiện mượt mà */
      #qr-reader-container {
        display: none;
        max-width: 100%;
        margin-top: 15px;
        padding: 10px;
        border: 2px dashed #28a745;
        border-radius: 8px;
        background: #fafafa;
      }
    </style>
    <script src="https://unpkg.com/html5-qrcode"></script>
  </head>
  <body>
    <div class="app-container">
      <div class="header">Tour Guide App</div>

      <div id="map-container"></div>

      <div class="control-panel">
        <div class="info-box">
          <h5 id="poi-name" class="mb-1">Đang tìm vị trí...</h5>
          <div id="poi-distance" class="status-text">
            Vui lòng bật GPS để bắt đầu
          </div>
        </div>

        <button
          id="btn-start"
          class="btn btn-primary w-100 py-2 fw-bold"
          onclick="startTour()"
        >
          🚀 BẮT ĐẦU CHUYẾN ĐI
        </button>
        
        <button
          id="btn-scan"
          class="btn btn-outline-secondary w-100 py-2 mt-2 fw-bold"
          onclick="toggleQrScanner()"
        >
          📷 Quét mã QR địa điểm
        </button>

        <div id="qr-reader-container">
          <div id="qr-reader" style="width: 100%;"></div>
          <p id="qr-status" class="small fw-bold text-muted mt-2">Đang khởi động camera...</p>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      var map = L.map("map-container").setView([10.76, 106.6822], 16);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap contributors",
      }).addTo(map);

      var userMarker = L.circleMarker([10.76, 106.6822], {
        color: "red",
        fillColor: "#f03",
        fillOpacity: 0.5,
        radius: 8,
      }).addTo(map);

      let isTracking = false;
      let currentAudio = null;
      let lastPlayedPoiId = null; // Quản lý thời gian chờ Cooldown của GPS [cite: 6]
      
      let html5QrcodeScanner = null;
      let isScannerOpen = false;

      // --- LOGIC GPS ĐỊNH VỊ NỀN ---
      function startTour() {
        if (!navigator.geolocation) {
          alert("Trình duyệt không hỗ trợ GPS!");
          return;
        }

        document
          .getElementById("btn-start")
          .classList.replace("btn-primary", "btn-success");
        document.getElementById("btn-start").innerText =
          "Đang theo dõi vị trí...";
        isTracking = true;

        navigator.geolocation.watchPosition(
          function (position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            userMarker.setLatLng([lat, lng]);
            map.panTo([lat, lng]);
            document.getElementById("poi-distance").innerText =
              `Tọa độ: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;

            checkGeofenceAPI(lat, lng);
          },
          function (error) {
            console.error("Lỗi GPS:", error);
          },
          { enableHighAccuracy: true, maximumAge: 0 },
        );
      }

      function checkGeofenceAPI(lat, lng) {
        const apiUrl = `http://localhost:5555/api/location/check?lat=${lat}&lng=${lng}`; [cite: 50]

        fetch(apiUrl)
          .then((response) => {
            if (!response.ok) throw new Error("Mạng hoặc Server gặp sự cố");
            return response.json();
          })
          .then((data) => {
            if (data.triggered === true) { [cite: 47]
              triggerAudio(data.poi.id, data.poi.name, data.audioUrl); [cite: 47]
            }
          })
          .catch((error) => {
            console.error("Lỗi gọi API Geofence:", error);
          });
      }

      // --- TRÌNH PHÁT NHẠC (NARRATION ENGINE) ---
      function triggerAudio(poiId, poiName, audioUrl, isOverride = false) {
        // Nếu là định vị GPS thông thường mà dính Cooldown trùng ID cũ thì bỏ qua [cite: 28]
        if (!isOverride && lastPlayedPoiId === poiId) return;

        if (currentAudio && !currentAudio.paused) {
          currentAudio.pause();
        }

        document.getElementById("poi-name").innerText = `📍 Đang đến: ${poiName}`;

        currentAudio = new Audio(audioUrl);
        currentAudio
          .play()
          .catch((e) => console.error("Trình duyệt chặn Autoplay.", e));

        lastPlayedPoiId = poiId;

        // Reset cooldown định vị sau 5 phút (300000 ms)
        setTimeout(() => {
          if (lastPlayedPoiId === poiId) lastPlayedPoiId = null;
        }, 300000);
      }

      // --- LOGIC NHIỆM VỤ TV3: QUÉT QR & OVERRIDE COOLDOWN ---
      function toggleQrScanner() {
        const container = document.getElementById("qr-reader-container");
        const btn = document.getElementById("btn-scan");

        if (isScannerOpen) {
          // Tắt máy quét camera
          if (html5QrcodeScanner) {
            html5QrcodeScanner.clear().then(() => {
              container.style.display = "none";
              btn.innerText = "📷 Quét mã QR địa điểm";
              btn.classList.replace("btn-danger", "btn-outline-secondary");
              isScannerOpen = false;
            }).catch(err => console.error("Lỗi tắt camera:", err));
          }
        } else {
          // Bật máy quét camera
          container.style.display = "block";
          btn.innerText = "🛑 Tắt Camera Quét";
          btn.classList.replace("btn-outline-secondary", "btn-danger");
          isScannerOpen = true;
          document.getElementById("qr-status").innerText = "Đang tìm camera...";

          html5QrcodeScanner = new Html5QrcodeScanner("qr-reader", { fps: 10, qrbox: 200 }, false);
          html5QrcodeScanner.render(onQrCodeSuccess, onQrCodeError);
        }
      }

      function onQrCodeSuccess(decodedText) {
        const poiId = parseInt(decodedText.trim()); [cite: 24, 25]
        
        if (isNaN(poiId)) {
          document.getElementById("qr-status").innerHTML = `<span class="text-danger">Mã QR không đúng định dạng ID địa điểm!</span>`;
          return;
        }

        document.getElementById("qr-status").innerHTML = `<span class="text-warning">Đã nhận diện ID: ${poiId}. Đang đồng bộ...</span>`;

        // Gọi API lấy dữ liệu POI cụ thể theo cấu trúc yêu cầu của TV3 [cite: 27, 45]
        fetch(`http://localhost:5555/api/POI/${poiId}`) [cite: 45, 50]
          .then(res => {
            if (!res.ok) throw new Error("ID không tồn tại");
            return res.json();
          })
          .then(poi => {
            document.getElementById("qr-status").innerHTML = `<span class="text-success">Thành công! Đang mở bài nghe cho: ${poi.name}</span>`;
            
            // Xử lý link nhạc động kế thừa cấu trúc mảng Audios từ TV2 [cite: 16]
            let finalAudioUrl = "default_audio.mp3";
            if (poi.audios && poi.audios.length > 0) {
              finalAudioUrl = poi.audios[0].audioUrl;
            } else if (poi.audioUrl) {
              finalAudioUrl = poi.audioUrl;
            }

            // CRITICAL LOGIC: Chuyền tham số true để BỎ QUA (OVERRIDE) mọi cooldown của hệ thống GPS [cite: 28]
            triggerAudio(poi.id, poi.name, finalAudioUrl, true); [cite: 28]
          })
          .catch(err => {
            document.getElementById("qr-status").innerHTML = `<span class="text-danger">Không tìm thấy địa điểm ứng với ID này!</span>`;
          });
      }

      function onQrCodeError(errorMessage) {
        // Để trống để tránh log tràn màn hình Console khi quét trượt khung hình
      }
    </script>
  </body>
</html>
