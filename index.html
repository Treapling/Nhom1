<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGU Tour Guide</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body class="bg-gray-800 text-gray-900 font-sans antialiased flex items-center justify-center min-h-[100dvh]">

    <div class="w-full max-w-[480px] md:max-w-full h-[100dvh] bg-white shadow-2xl flex flex-col relative overflow-hidden">

        <header class="bg-blue-600 text-white px-4 py-3 md:py-4 flex justify-between items-center shadow-md z-20">
            <h1 class="text-xl md:text-2xl font-bold tracking-wide">SGU Tour Guide</h1>
            <button id="btn-scan-qr"
                class="bg-blue-700 hover:bg-blue-800 active:bg-blue-900 px-3 py-1.5 md:px-5 md:py-2.5 rounded-lg text-sm md:text-base font-medium flex items-center gap-2 transition-colors">
                <span class="text-base md:text-lg">📷</span> Quét QR
            </button>
        </header>

        <div class="flex-1 flex flex-col md:flex-row overflow-hidden relative">

        <main class="flex-1 relative flex flex-col bg-gray-50 overflow-hidden">

            <div id="view-map" class="absolute inset-0 w-full h-full z-10 transition-opacity duration-300">
                <div id="map" class="w-full h-full"></div>

                <div id="poi-card"
                    class="absolute bottom-4 inset-x-0 mx-4 z-[1001] bg-white/95 backdrop-blur-sm p-5 rounded-2xl shadow-2xl transform transition-transform duration-300 hidden">
                    <button id="close-poi-btn"
                        class="absolute top-2 right-3 text-gray-400 hover:text-red-500 font-bold text-xl transition-colors">
                        &times;
                    </button>
                    <h2 id="poi-name" class="text-xl font-bold text-blue-900 mb-1">Cơ sở chính Đại học Sài Gòn</h2>
                    <p id="poi-desc" class="text-sm text-gray-600 mb-4 line-clamp-2">Đang tải...</p>
                    <audio id="audio-player" controls class="w-full h-10 outline-none">
                        <source src="" type="audio/mpeg">
                    </audio>
                </div>
            </div>

            <div id="view-history" class="absolute inset-0 w-full h-full bg-gray-50 overflow-y-auto p-4 z-20 hidden">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Lịch sử địa điểm</h2>
                <div class="text-center text-gray-400 mt-10">
                    <p class="text-4xl mb-3">🕒</p>
                    <p>Chưa có lịch sử quét QR nào.</p>
                </div>
            </div>

            <div id="view-settings" class="absolute inset-0 w-full h-full bg-gray-50 overflow-y-auto p-4 z-20 hidden">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Cài đặt</h2>
                <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center">
                    <span class="text-gray-700 font-medium">Tự động phát âm thanh</span>
                    <input type="checkbox" id="toggle-tts" checked class="w-5 h-5 accent-blue-600">
                </div>

                <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center mt-4">
                    <span class="text-gray-700 font-medium">Ngôn ngữ (Language)</span>
                    <select id="lang-selector"
                        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2 outline-none font-medium transition-colors">
                        <option value="vi" selected>🇻🇳 Tiếng Việt</option>
                        <option value="en">🇬🇧 English</option>
                        <option value="zh">🇨🇳 中文</option>
                    </select>
                </div>
            </div>

        </main>

        <footer class="bg-white border-t md:border-t-0 md:border-r border-gray-200 flex md:flex-col h-16 md:h-full md:w-64 z-30 relative order-last md:order-first">
            <button id="tab-map"
                class="flex-1 md:flex-none md:py-5 flex flex-col md:flex-row items-center justify-center md:justify-start md:px-8 text-blue-600 md:hover:bg-blue-50 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1 md:mb-0 md:mr-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
                </svg>
                <span class="text-[10px] md:text-base font-semibold md:font-medium">Bản đồ</span>
            </button>
            <button id="tab-history"
                class="flex-1 md:flex-none md:py-5 flex flex-col md:flex-row items-center justify-center md:justify-start md:px-8 text-gray-400 hover:text-blue-600 md:hover:bg-blue-50 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1 md:mb-0 md:mr-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span class="text-[10px] md:text-base font-medium">Lịch sử</span>
            </button>
            <button id="tab-settings"
                class="flex-1 md:flex-none md:py-5 flex flex-col md:flex-row items-center justify-center md:justify-start md:px-8 text-gray-400 hover:text-blue-600 md:hover:bg-blue-50 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1 md:mb-0 md:mr-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <span class="text-[10px] md:text-base font-medium">Cài đặt</span>
            </button>
        </footer>

        </div> <!-- Đóng thẻ div flex-row cho Desktop wrapper -->

    </div>

    <div id="qr-modal" class="hidden fixed inset-0 z-[9999] bg-black/80 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-[400px] rounded-2xl overflow-hidden shadow-2xl flex flex-col">
            <div class="bg-blue-600 px-4 py-3 text-white text-center font-bold text-lg">
                Quét mã QR Địa điểm
            </div>
            <div class="p-4 bg-gray-50 flex-1">
                <div id="qr-reader" class="w-full rounded-lg overflow-hidden border-2 border-dashed border-blue-400">
                </div>
            </div>
            <div class="p-4 bg-white border-t border-gray-100">
                <button id="btn-close-qr"
                    class="w-full bg-red-500 hover:bg-red-600 active:bg-red-700 text-white py-3 rounded-xl font-semibold transition-colors">
                    Đóng Camera
                </button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <script src="js/ui.js?v=5"></script>
    <script src="js/qr-scanner.js?v=3"></script>

</body>

</html>
