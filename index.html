<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Hệ thống Thuyết minh Du lịch</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      body,
      html {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #f8f9fa;
      }
      .app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-width: 500px;
        margin: 0 auto;
        background-color: white;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      }
      .header {
        background-color: #0d6efd;
        color: white;
        padding: 15px;
        text-align: center;
        font-weight: bold;
        font-size: 1.2rem;
      }
      #map-container {
        flex-grow: 1;
        width: 100%;
      }
      .control-panel {
        padding: 20px;
        background-color: white;
        border-top: 1px solid #dee2e6;
        text-align: center;
      }
      .info-box {
        background-color: #e9ecef;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 15px;
      }
      .status-text {
        font-size: 0.9rem;
        color: #6c757d;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <div class="header">Tour Guide App</div>

      <div id="map-container"></div>

      <div class="control-panel">
        <div class="info-box">
          <h5 id="poi-name" class="mb-1">Đang tìm vị trí...</h5>
          <div id="poi-distance" class="status-text">
            Vui lòng bật GPS để bắt đầu
          </div>
        </div>

        <button
          id="btn-start"
          class="btn btn-primary w-100 py-2 fw-bold"
          onclick="startTour()"
        >
          🚀 BẮT ĐẦU CHUYẾN ĐI
        </button>
        <button
          id="btn-scan"
          class="btn btn-outline-secondary w-100 py-2 mt-2 fw-bold"
        >
          📷 Quét mã QR
        </button>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      var map = L.map("map-container").setView([10.76, 106.6822], 16);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap contributors",
      }).addTo(map);

      var userMarker = L.circleMarker([10.76, 106.6822], {
        color: "red",
        fillColor: "#f03",
        fillOpacity: 0.5,
        radius: 8,
      }).addTo(map);

      let isTracking = false;
      let currentAudio = null;
      let lastPlayedPoiId = null; // Biến lưu trạng thái Cooldown

      function startTour() {
        if (!navigator.geolocation) {
          alert("Trình duyệt không hỗ trợ GPS!");
          return;
        }

        document
          .getElementById("btn-start")
          .classList.replace("btn-primary", "btn-success");
        document.getElementById("btn-start").innerText =
          "Đang theo dõi vị trí...";
        isTracking = true;

        navigator.geolocation.watchPosition(
          function (position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            userMarker.setLatLng([lat, lng]);
            map.panTo([lat, lng]);
            document.getElementById("poi-distance").innerText =
              `Tọa độ: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;

            // Gọi API backend để kiểm tra Geofence
            checkGeofenceAPI(lat, lng);
          },
          function (error) {
            console.error("Lỗi GPS:", error);
          },
          { enableHighAccuracy: true, maximumAge: 0 },
        );
      }

      function checkGeofenceAPI(lat, lng) {
        // Gọi API của Server ASP.NET Core đang chạy ở cổng 5555
        const apiUrl = `http://localhost:5555/api/location/check?lat=${lat}&lng=${lng}`;

        fetch(apiUrl)
          .then((response) => {
            if (!response.ok) {
              throw new Error("Mạng hoặc Server gặp sự cố");
            }
            return response.json();
          })
          .then((data) => {
            // Nếu API trả về true (có điểm POI nằm trong bán kính)
            if (data.triggered === true) {
              // Truyền ID, Tên điểm và Link nhạc vào hàm phát âm thanh
              triggerAudio(data.poi.id, data.poi.name, data.audioUrl);
            }
          })
          .catch((error) => {
            console.error("Lỗi gọi API Geofence:", error);
          });
      }

      // Narration Engine: Xử lý chống spam
      function checkGeofenceAPI(lat, lng) {
        // Gọi API của Server ASP.NET Core đang chạy ở cổng 5555
        const apiUrl = `http://localhost:5555/api/location/check?lat=${lat}&lng=${lng}`;

        fetch(apiUrl)
          .then((response) => {
            if (!response.ok) {
              throw new Error("Mạng hoặc Server gặp sự cố");
            }
            return response.json();
          })
          .then((data) => {
            // Nếu API trả về true (có điểm POI nằm trong bán kính)
            if (data.triggered === true) {
              // Truyền ID, Tên điểm và Link nhạc vào hàm phát âm thanh
              triggerAudio(data.poi.id, data.poi.name, data.audioUrl);
            }
          })
          .catch((error) => {
            console.error("Lỗi gọi API Geofence:", error);
          });
      }

      // Narration Engine: Xử lý chống spam (Giữ nguyên)
      function triggerAudio(poiId, poiName, audioUrl) {
        if (lastPlayedPoiId === poiId) return;

        if (currentAudio && !currentAudio.paused) {
          currentAudio.pause();
        }

        document.getElementById("poi-name").innerText =
          `📍 Đang đến: ${poiName}`;

        currentAudio = new Audio(audioUrl);
        currentAudio
          .play()
          .catch((e) => console.error("Trình duyệt chặn Autoplay.", e));

        lastPlayedPoiId = poiId;

        // Reset cooldown sau 5 phút (300000 ms)
        setTimeout(() => {
          if (lastPlayedPoiId === poiId) lastPlayedPoiId = null;
        }, 300000);
      }

      // Hàm tính khoảng cách tạm thời dùng ở Client khi Server chưa bật
    </script>
  </body>
</html>
