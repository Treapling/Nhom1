<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGU Tour Guide</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body class="bg-gray-800 text-gray-900 font-sans antialiased flex items-center justify-center min-h-screen">

    <div class="w-full max-w-[480px] h-screen bg-white shadow-2xl flex flex-col relative overflow-hidden">

        <header class="bg-blue-600 text-white px-4 py-3 flex justify-between items-center shadow-md z-20">
            <h1 class="text-xl font-bold tracking-wide">SGU Tour Guide</h1>
            
            <button id="btn-scan-qr" class="bg-blue-700 hover:bg-blue-800 active:bg-blue-900 px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-2 transition-colors">
                <span class="text-base">📷</span> 
                Quét QR
            </button>
        </header>

        <main class="flex-1 relative flex flex-col">
            
            <div id="map" class="w-full h-full bg-gray-200 flex items-center justify-center text-gray-500">
                <p>📍 Khu vực hiển thị bản đồ</p>
            </div>

            <div id="poi-card" class="hidden absolute bottom-4 left-4 right-4 bg-white rounded-2xl shadow-xl p-5 border border-gray-100 z-10">
                <h2 id="poi-name" class="text-xl font-bold text-blue-900 mb-1">Cơ sở chính Đại học Sài Gòn</h2>
                <p id="poi-desc" class="text-sm text-gray-600 mb-4 line-clamp-2">Đang tải...</p>
                <audio id="audio-player" controls class="w-full h-10 outline-none">
                   <source src="" type="audio/mpeg">
                </audio>
            </div>
            
        </main>

        <footer class="bg-white border-t border-gray-200 flex h-16 z-20">
            <button class="flex-1 flex flex-col items-center justify-center text-blue-600 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
                </svg>
                <span class="text-[10px] font-semibold">Bản đồ</span>
            </button>

            <button class="flex-1 flex flex-col items-center justify-center text-gray-500 hover:text-blue-600 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span class="text-[10px] font-medium">Lịch sử</span>
            </button>

            <button class="flex-1 flex flex-col items-center justify-center text-gray-500 hover:text-blue-600 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <span class="text-[10px] font-medium">Cài đặt</span>
            </button>
        </footer>

    </div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        const map = L.map('map').setView([10.7600, 106.6822], 16);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

       
        setTimeout(() => { 
            map.invalidateSize(); 
        }, 500);

        let userMarker = L.marker([10.7600, 106.6822]).addTo(map);
        userMarker.bindPopup("Vị trí của bạn").openPopup();

        if ("geolocation" in navigator) {
    let lastCheckTime = 0;
    let lastPlayedPoiId = null;

    const geoOptions = {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 5000
    };

    const poiCard = document.getElementById('poi-card');
    const poiName = document.getElementById('poi-name'); 
    const poiDesc = document.getElementById('poi-desc');
    const audioPlayer = document.getElementById('audio-player');

    navigator.geolocation.watchPosition(
        function(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const newLatLng = new L.LatLng(lat, lng);

            if (userMarker) {
                userMarker.setLatLng(newLatLng);
            } else {
                userMarker = L.marker(newLatLng).addTo(map)
                    .bindPopup("Vị trí của bạn").openPopup();
            }
            map.panTo(newLatLng);

            const currentTime = Date.now();
            
            if (currentTime - lastCheckTime > 5000) {
                lastCheckTime = currentTime; 

                fetch(`http://localhost:5555/api/location/check?lat=${lat}&lng=${lng}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.triggered === true) {
                            poiCard.classList.remove('hidden');
                            if (poiName) poiName.innerText = data.poi.name;
                            if (poiDesc) poiDesc.innerText = data.poi.description;

                            if (data.poi.id !== lastPlayedPoiId) {
                                if (audioPlayer) {
                                    audioPlayer.src = data.audioUrl;
                                    
                                    audioPlayer.onerror = () => {
                                        console.warn("Không tải được audio, chuyển sang chế độ đọc tự động (TTS).");
                                        const utterance = new SpeechSynthesisUtterance(data.poi.description);
                                        utterance.lang = 'vi-VN'; 
                                        window.speechSynthesis.speak(utterance);
                                    };

                                    audioPlayer.play().catch(err => {
                                        console.warn("Trình duyệt chặn phát âm thanh tự động:", err);
                                    });
                                }
                                
                                lastPlayedPoiId = data.poi.id;
                            }
                        } else {
                            poiCard.classList.add('hidden');
                        }
                    })
                    .catch(error => {
                        console.error("Lỗi khi kết nối đến API Server:", error);
                    });
            }
        },
        function(error) {
            console.warn(`Lỗi định vị (${error.code}): ${error.message}`);
        },
        geoOptions
    );
} else {
    console.error("Trình duyệt của bạn không hỗ trợ Geolocation.");
}
    </script>
    <div id="qr-modal" class="hidden fixed inset-0 z-[9999] bg-black/80 flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-[400px] rounded-2xl overflow-hidden shadow-2xl flex flex-col">
        <div class="bg-blue-600 px-4 py-3 text-white text-center font-bold text-lg">
            Quét mã QR Địa điểm
        </div>
        
        <div class="p-4 bg-gray-50 flex-1">
            <div id="qr-reader" class="w-full rounded-lg overflow-hidden border-2 border-dashed border-blue-400"></div>
        </div>

        <div class="p-4 bg-white border-t border-gray-100">
            <button id="btn-close-qr" class="w-full bg-red-500 hover:bg-red-600 active:bg-red-700 text-white py-3 rounded-xl font-semibold transition-colors">
                Đóng Camera
            </button>
        </div>
    </div>
</div>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const btnScanQR = document.getElementById('btn-scan-qr');
    const btnCloseQR = document.getElementById('btn-close-qr');
    const qrModal = document.getElementById('qr-modal');
    
    let html5QrCode = null;

    const mockPOIData = {
        1: { name: "Đại học Sài Gòn", description: "Ngôi trường lâu đời với kiến trúc Pháp tuyệt đẹp, nơi lưu giữ nhiều giá trị lịch sử và văn hóa." },
        2: { name: "Chợ Bến Thành", description: "Khu chợ biểu tượng của thành phố Hồ Chí Minh, điểm đến không thể bỏ qua của du khách." }
    };

    btnScanQR.addEventListener('click', () => {
        qrModal.classList.remove('hidden');
        
        Html5Qrcode.getCameras().then(devices => {
            if (devices && devices.length > 0) {
                const cameraId = devices[0].id; 
                
                html5QrCode = new Html5Qrcode("qr-reader");
                const config = { fps: 10, qrbox: { width: 250, height: 250 } };
                
                html5QrCode.start(
                    cameraId, 
                    config, 
                    onScanSuccess
                ).catch((err) => {
                    console.error("Lỗi khi mở camera:", err);
                    alert("Lỗi phần cứng Camera: " + err); 
                });
            } else {
                alert("Trình duyệt không tìm thấy chiếc Camera nào đang được kết nối!");
            }
        }).catch(err => {
            console.error("Lỗi cấp quyền:", err);
            alert("Trình duyệt hoặc Windows đang chặn quyền Camera! Lỗi: " + err);
        });
    });

    function onScanSuccess(decodedText, decodedResult) {
        stopCamera().then(() => {
            qrModal.classList.add('hidden');
            
            const poiId = parseInt(decodedText);
            const poiInfo = mockPOIData[poiId]; 

            if (poiInfo) {
                const poiCard = document.getElementById('poi-card');
                const poiName = document.getElementById('poi-name');
                const poiDesc = document.getElementById('poi-desc');
                
                poiCard.classList.remove('hidden');
                poiName.innerText = poiInfo.name;
                poiDesc.innerText = poiInfo.description;

                readTextToSpeech(poiInfo.description);
            } else {
                alert('Không tìm thấy địa điểm cho ID: ' + decodedText);
            }
        });
    }

    function readTextToSpeech(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'vi-VN'; 
            window.speechSynthesis.speak(utterance);
        } else {
            console.warn("Trình duyệt không hỗ trợ đọc văn bản.");
        }
    }

    btnCloseQR.addEventListener('click', () => {
        stopCamera().then(() => {
            qrModal.classList.add('hidden');
        });
    });

    function stopCamera() {
        if (html5QrCode && html5QrCode.isScanning) {
            return html5QrCode.stop().then(() => {
                html5QrCode.clear(); 
            }).catch((err) => {
                console.error("Lỗi khi tắt camera:", err);
            });
        }
        return Promise.resolve(); 
    }
});
</script>
</body>
</html>
