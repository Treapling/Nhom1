<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Quản lý Người Bán (Vendor)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body { background-color: #eef2f7; }
        .navbar { background-color: #007bff; }
        .navbar-brand { color: white !important; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">🏪 Vendor Portal</a>
            <div class="d-flex">
                <button class="btn btn-outline-light" onclick="logout()">Đăng xuất</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8 mx-auto text-center">
                <div class="card p-5 shadow-sm border-0 rounded-4">
                    <h2 class="mb-4 text-primary">Xin chào Vendor!</h2>
                    <p class="lead text-secondary">Đây là trang quản lý dành riêng cho đối tác bán hàng. Hiện tại giao diện đang được xây dựng.</p>
                    <hr class="my-4">
                    <p>Trong tương lai, bạn có thể tải lên các file âm thanh giới thiệu cửa hàng, tạo mã QR khuyến mãi, và xem thống kê khách hàng tại đây.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Kiểm tra xem đã đăng nhập chưa (cơ bản)
        const role = localStorage.getItem('userRole');
        if (role !== "Vendor") {
            alert("Bạn không có quyền truy cập trang này. Vui lòng đăng nhập tài khoản Vendor.");
            window.location.href = "/login";
        }

        function logout() {
            localStorage.clear();
            window.location.href = "/login";
        }
    </script>
</body>
</html>
