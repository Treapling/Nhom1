<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thanh toán Premium - Vĩnh Khánh Tour</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"
      rel="stylesheet"
    />
  </head>
  <body
    class="bg-gray-900 font-sans antialiased flex items-center justify-center min-h-screen p-4"
  >
    <div class="bg-white max-w-md w-full rounded-2xl shadow-xl overflow-hidden">
      <div class="bg-red-600 px-6 py-4 text-white text-center shadow-sm">
        <h2 class="text-2xl font-extrabold">Mua vé Audio Premium 24h</h2>
      </div>
      <div class="p-6">
        <p class="text-gray-600 text-center mb-6 font-medium">
          Quét mã QR MoMo dưới đây để kích hoạt giọng đọc người thật, gửi bình
          luận và bỏ giới hạn 5 lượt quét.
        </p>
        <div class="flex justify-center mb-6">
          <div
            class="border-2 border-dashed border-red-300 p-4 rounded-xl text-center bg-red-50"
          >
            <div
              class="bg-gray-200 w-48 h-48 mb-2 flex items-center justify-center font-bold text-gray-500 rounded-lg mx-auto"
            >
              [MÃ QR MOMO]
            </div>
            <p class="font-black text-xl text-red-600">20.000 VNĐ</p>
          </div>
        </div>
        <button
          id="btnConfirm"
          onclick="confirmPayment()"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl shadow-md transition-colors mb-3"
        >
          Xác nhận đã chuyển khoản
        </button>
        <a
          href="index.html"
          class="block w-full text-center text-gray-500 hover:text-gray-700 font-medium py-2"
          >Quay lại trang chủ</a
        >
      </div>
    </div>
    <script>
      function confirmPayment() {
        const btn = document.getElementById("btnConfirm");
        btn.innerText = "Đang xử lý...";
        btn.disabled = true;

        fetch("/api/Auth/guest-premium", { method: "POST" })
          .then((res) => res.json())
          .then((data) => {
            localStorage.setItem("guestToken", data.token);
            window.location.href = "index.html"; // Quay về và tự kích hoạt
          })
          .catch(() => {
            alert("Lỗi mạng!");
            btn.innerText = "Thử lại";
            btn.disabled = false;
          });
      }
    </script>
  </body>
</html>
