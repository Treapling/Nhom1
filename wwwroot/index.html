<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>SGU Tour Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script
      src="https://unpkg.com/html5-qrcode"
      type="text/javascript"
    ></script>
  </head>
  <body
    class="bg-gray-800 text-gray-900 font-sans antialiased flex items-center justify-center min-h-screen"
  >
    <div
      id="activation-overlay"
      class="fixed inset-0 z-[10000] bg-white flex flex-col items-center justify-center px-6 text-center"
    >
      <div class="mb-6"><span class="text-6xl">🗺️</span></div>
      <h2 class="text-3xl font-extrabold text-blue-700 mb-2">SGU Tour Guide</h2>
      <p class="text-gray-600 mb-8 font-medium">
        Vui lòng nhập mã chuyến đi để mở khóa bản đồ và trải nghiệm thuyết minh
        tự động.
      </p>
      <input
        type="text"
        id="tourCodeInput"
        placeholder="Nhập mã (VD: SGU2026)"
        class="w-full max-w-[300px] border-2 border-blue-200 rounded-xl p-4 text-center text-xl font-bold text-blue-800 mb-4 focus:outline-none focus:border-blue-500 uppercase transition-colors"
      />

      <button
        onclick="checkTourCode()"
        class="w-full max-w-[300px] bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-colors text-lg"
      >
        Kích Hoạt Ngay
      </button>

      <div class="mt-4 mb-2">
        <span class="text-gray-400 font-medium">--- Hoặc ---</span>
      </div>

      <a
        href="checkout.html"
        class="w-full max-w-[300px] bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg transition-colors text-lg inline-block text-center"
      >
        Mua vé nghe 24h (20.000đ)
      </a>
    </div>

    <div
      class="w-full max-w-[480px] h-screen bg-white shadow-2xl flex flex-col relative overflow-hidden"
    >
      <header
        class="bg-blue-600 text-white px-4 py-3 flex justify-between items-center shadow-md z-20"
      >
        <div class="flex flex-col">
          <h1 class="text-xl font-bold tracking-wide">SGU Tour Guide</h1>
          <select
            id="lang-switch"
            class="bg-blue-800 text-white text-xs rounded mt-1 px-1 py-0.5 outline-none w-[100px] border-none"
          >
            <option value="vi">🇻🇳 Tiếng Việt</option>
            <option value="en">🇬🇧 English</option>
          </select>
        </div>
        <button
          id="btn-scan-qr"
          class="bg-blue-700 hover:bg-blue-800 px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-2"
        >
          <span class="text-base">📷</span> Quét QR
        </button>
      </header>

      <main class="flex-1 relative flex flex-col">
        <div
          id="map"
          class="w-full h-full bg-gray-200 flex items-center justify-center text-gray-500 z-0"
        >
          <p>📍 Khu vực hiển thị bản đồ</p>
        </div>

        <div
          id="poi-card"
          class="hidden absolute bottom-4 left-4 right-4 bg-white rounded-2xl shadow-xl p-5 border border-gray-100 z-10 max-h-[60vh] overflow-y-auto"
        >
          <div class="flex justify-between items-start mb-1">
            <h2 id="poi-name" class="text-xl font-bold text-blue-900 pr-2">
              Tên địa điểm
            </h2>
            <button
              onclick="toggleBookmark()"
              class="text-2xl hover:scale-110 transition-transform"
              title="Lưu yêu thích"
            >
              ❤️
            </button>
          </div>

          <p id="poi-desc" class="text-sm text-gray-600 mb-3">Đang tải...</p>
          <audio
            id="audio-player"
            controls
            class="w-full h-10 outline-none mb-3"
            style="display: none"
          ></audio>

          <div
            id="poi-menu-container"
            class="mb-4 text-sm bg-blue-50 p-3 rounded-lg hidden"
          >
            <h3
              class="font-bold text-blue-800 mb-2 border-b border-blue-200 pb-1"
            >
              🍽️ Thực đơn:
            </h3>
            <div id="poi-menu-list" class="space-y-1"></div>
          </div>

          <div
            class="p-3 bg-gray-50 rounded-lg border border-gray-200 flex flex-col gap-2"
          >
            <textarea
              id="review-comment"
              rows="2"
              class="w-full border border-gray-300 p-2 rounded text-sm outline-none focus:border-blue-500"
              placeholder="Nhập nhận xét của bạn về địa điểm này..."
            ></textarea>
            <div class="flex items-center gap-2">
              <select
                id="rating-select"
                class="border border-gray-300 p-1.5 rounded text-sm bg-white flex-1"
              >
                <option value="5">⭐⭐⭐⭐⭐</option>
                <option value="4">⭐⭐⭐⭐</option>
                <option value="3">⭐⭐⭐</option>
                <option value="2">⭐⭐</option>
                <option value="1">⭐</option>
              </select>
              <button
                onclick="submitReview()"
                class="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded-lg text-sm font-bold transition-colors"
              >
                Gửi Đánh Giá
              </button>
            </div>
          </div>
        </div>
      </main>

      <footer class="bg-white border-t border-gray-200 flex h-16 z-20">
        <button
          class="flex-1 flex flex-col items-center justify-center text-blue-600"
        >
          <span class="text-xs font-semibold">📍 Bản đồ</span>
        </button>
        <button
          onclick="showBookmarks()"
          class="flex-1 flex flex-col items-center justify-center text-gray-500"
        >
          <span class="text-xs font-medium">❤️ Đã lưu</span>
        </button>
        <button
          onclick="alert('Tính năng đang phát triển')"
          class="flex-1 flex flex-col items-center justify-center text-gray-500"
        >
          <span class="text-xs font-medium">⚙️ Cài đặt</span>
        </button>
      </footer>
    </div>

    <div
      id="qr-modal"
      class="hidden fixed inset-0 z-[9999] bg-black/80 flex items-center justify-center p-4"
    >
      <div
        class="bg-white w-full max-w-[400px] rounded-2xl overflow-hidden shadow-2xl flex flex-col"
      >
        <div
          class="bg-blue-600 px-4 py-3 text-white text-center font-bold text-lg"
        >
          Quét mã QR Địa điểm
        </div>
        <div class="p-4 bg-gray-50 flex-1">
          <div
            id="qr-reader"
            class="w-full rounded-lg overflow-hidden border-2 border-dashed border-blue-400"
          ></div>
        </div>
        <div class="p-4 bg-white border-t border-gray-100">
          <button
            id="btn-close-qr"
            class="w-full bg-red-500 hover:bg-red-600 text-white py-3 rounded-xl font-semibold"
          >
            Đóng Camera
          </button>
        </div>
      </div>
    </div>
    <div
      id="bookmark-modal"
      class="hidden fixed inset-0 z-[9999] bg-black/80 flex items-center justify-center p-4"
    >
      <div
        class="bg-white w-full max-w-[400px] rounded-2xl overflow-hidden shadow-2xl flex flex-col max-h-[80vh]"
      >
        <div
          class="bg-pink-600 px-4 py-3 text-white text-center font-bold text-lg flex justify-between items-center"
        >
          <span>❤️ Địa điểm đã lưu</span>
          <button
            onclick="
              document.getElementById('bookmark-modal').classList.add('hidden')
            "
            class="text-white text-2xl leading-none"
          >
            &times;
          </button>
        </div>
        <div class="p-4 overflow-y-auto flex-1">
          <ul id="bookmark-list" class="divide-y divide-gray-200"></ul>
        </div>
      </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
      let currentPoiId = null;
      let currentPoiName = "";
      let currentPoiData = null;

      // 1. Kiểm tra trạng thái kích hoạt Tour
      document.addEventListener("DOMContentLoaded", () => {
        if (localStorage.getItem("isTourActivated") === "true") {
          document.getElementById("activation-overlay").classList.add("hidden");
        }
      });

      function checkTourCode() {
        const codeInput = document
          .getElementById("tourCodeInput")
          .value.trim()
          .toUpperCase();
        if (codeInput === "SGU2026") {
          fetch("/api/Auth/guest-token", {
            method: "POST",
            headers: { "ngrok-skip-browser-warning": "true" },
          })
            .then((res) => res.json())
            .then((data) => {
              localStorage.setItem("guestToken", data.token);
              localStorage.setItem("isTourActivated", "true");
              document
                .getElementById("activation-overlay")
                .classList.add("hidden");
              setTimeout(() => {
                if (typeof map !== "undefined") map.invalidateSize();
              }, 500);
            })
            .catch((err) => alert("Lỗi mạng"));
        } else {
          alert("Mã không hợp lệ.");
        }
      }

      // 2. Khởi tạo Bản đồ Leaflet
      const map = L.map("map").setView([10.76, 106.6822], 16);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(
        map,
      );
      setTimeout(() => map.invalidateSize(), 500);
      let userMarker = L.marker([10.76, 106.6822])
        .addTo(map)
        .bindPopup("Vị trí của bạn")
        .openPopup();

      // 3. Xử lý Geofencing (GPS)
      if ("geolocation" in navigator) {
        let lastCheckTime = 0;
        let lastPlayedPoiId = null;

        navigator.geolocation.watchPosition(
          function (position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const newLatLng = new L.LatLng(lat, lng);
            userMarker.setLatLng(newLatLng);
            map.panTo(newLatLng);

            if (Date.now() - lastCheckTime > 5000) {
              lastCheckTime = Date.now();

              // BƯỚC 1: Kiểm tra xem có đang đứng trong vùng an toàn (bán kính) không
              fetch(`/api/location/check?lat=${lat}&lng=${lng}`, {
                headers: {
                  "ngrok-skip-browser-warning": "true",
                  Authorization: "Bearer " + localStorage.getItem("guestToken"),
                },
              })
                .then((response) => response.json())
                .then((data) => {
                  if (
                    data.triggered === true &&
                    data.poi.id !== lastPlayedPoiId
                  ) {
                    lastPlayedPoiId = data.poi.id;

                    // BƯỚC 2: Gọi API lấy chi tiết để có mô tả (description) phục vụ AI Dịch Thuật
                    fetch(`/api/POI/${data.poi.id}`, {
                      headers: {
                        "ngrok-skip-browser-warning": "true",
                        Authorization:
                          "Bearer " + localStorage.getItem("guestToken"),
                      },
                    })
                      .then((res) => res.json())
                      .then((fullPoiInfo) => {
                        renderPoiCard(fullPoiInfo);
                      });
                  }
                })
                .catch((err) => console.error("Lỗi GPS API: ", err));
            }
          },
          (err) => console.warn(`Lỗi GPS: ${err.message}`),
          { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 },
        );
      }

      // 4. Xử lý Thực đơn (Menu)
      function fetchAndRenderMenu(poiId) {
        const menuContainer = document.getElementById("poi-menu-container");
        const menuList = document.getElementById("poi-menu-list");

        fetch(`/api/Menu/poi/${poiId}`, {
          headers: {
            Authorization: "Bearer " + localStorage.getItem("guestToken"),
            "ngrok-skip-browser-warning": "true",
          },
        })
          .then((res) => res.json())
          .then((menus) => {
            if (menus && menus.length > 0) {
              menuList.innerHTML = menus
                .map(
                  (m) =>
                    `<div class="flex justify-between border-b border-blue-100 py-1"><span class="text-gray-800">${m.itemName}</span><span class="font-bold text-pink-600">${m.price.toLocaleString("vi-VN")}đ</span></div>`,
                )
                .join("");
              menuContainer.classList.remove("hidden");
            } else {
              menuContainer.classList.add("hidden");
            }
          })
          .catch((err) => menuContainer.classList.add("hidden"));
      }

      // 5. HÀM DỊCH TỰ ĐỘNG VÀ ĐỌC AI (Google Translate API)
      async function translateAndSpeak(originalText, targetLang) {
        if (!("speechSynthesis" in window)) return;
        window.speechSynthesis.cancel(); // Tắt giọng đọc cũ

        let textToSpeak = originalText;
        const descElement = document.getElementById("poi-desc");
        descElement.innerText = "Đang dịch tự động...";

        if (targetLang !== "vi") {
          try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=vi&tl=${targetLang}&dt=t&q=${encodeURIComponent(originalText)}`;
            const res = await fetch(url);
            const data = await res.json();
            textToSpeak = data[0].map((item) => item[0]).join("");
          } catch (error) {
            console.error("Lỗi dịch thuật:", error);
            textToSpeak =
              "Sorry, translation service is temporarily unavailable.";
          }
        }

        descElement.innerText = textToSpeak;

        const utterance = new SpeechSynthesisUtterance(textToSpeak);
        utterance.lang = targetLang === "vi" ? "vi-VN" : "en-US";
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
      }

      // 6. Hiển thị thông tin địa điểm
      function renderPoiCard(poiInfo) {
        currentPoiId = poiInfo.id;
        currentPoiName = poiInfo.name;
        currentPoiData = poiInfo;

        document.getElementById("poi-card").classList.remove("hidden");
        document.getElementById("poi-name").innerText = poiInfo.name;

        fetchAndRenderMenu(poiInfo.id);

        const selectedLang = document.getElementById("lang-switch").value;
        translateAndSpeak(poiInfo.description, selectedLang);
      }

      function submitReview() {
        if (!currentPoiId) return;
        const rating = document.getElementById("rating-select").value;
        const comment = document.getElementById("review-comment").value; // Lấy dữ liệu văn bản
        const token = localStorage.getItem("guestToken");

        fetch("/api/Review", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token,
            "ngrok-skip-browser-warning": "true",
          },
          body: JSON.stringify({
            POI_Id: currentPoiId,
            Rating: parseInt(rating),
            Comment: comment || "Đánh giá từ App", // Nếu khách bỏ trống, dùng mặc định
          }),
        }).then((res) => {
          if (res.ok) {
            alert("Cảm ơn bạn! Đã gửi đánh giá " + rating + " sao.");
            document.getElementById("review-comment").value = ""; // Xóa form sau khi gửi
          }
        });
      }

      function toggleBookmark() {
        if (!currentPoiId) return;
        let bookmarks =
          JSON.parse(localStorage.getItem("bookmarkedPOIs")) || [];
        const index = bookmarks.findIndex((b) => b.id === currentPoiId);
        if (index === -1) {
          bookmarks.push({ id: currentPoiId, name: currentPoiName });
          alert("Đã lưu vào danh sách yêu thích!");
        } else {
          bookmarks.splice(index, 1);
          alert("Đã xóa khỏi danh sách yêu thích.");
        }
        localStorage.setItem("bookmarkedPOIs", JSON.stringify(bookmarks));
      }

      function showBookmarks() {
        const bookmarks =
          JSON.parse(localStorage.getItem("bookmarkedPOIs")) || [];
        const list = document.getElementById("bookmark-list");

        if (bookmarks.length === 0) {
          list.innerHTML =
            "<p class='text-gray-500 text-center py-4'>Chưa có địa điểm nào được lưu.</p>";
        } else {
          list.innerHTML = bookmarks
            .map(
              (b) => `
                <li class="py-3 flex justify-between items-center">
                    <span class="font-medium text-gray-800">${b.name}</span>
                    <button onclick="removeBookmark(${b.id})" class="text-red-500 text-sm border border-red-500 rounded px-2 py-1 hover:bg-red-50">Xóa</button>
                </li>
            `,
            )
            .join("");
        }
        document.getElementById("bookmark-modal").classList.remove("hidden");
      }

      function removeBookmark(id) {
        let bookmarks =
          JSON.parse(localStorage.getItem("bookmarkedPOIs")) || [];
        bookmarks = bookmarks.filter((b) => b.id !== id);
        localStorage.setItem("bookmarkedPOIs", JSON.stringify(bookmarks));
        showBookmarks(); // Cập nhật lại giao diện danh sách ngay lập tức
      }

      // 7. Sự kiện chuyển ngôn ngữ thời gian thực
      document
        .getElementById("lang-switch")
        .addEventListener("change", function () {
          if (currentPoiData && currentPoiData.description) {
            const selectedLang = this.value;
            translateAndSpeak(currentPoiData.description, selectedLang);
          }
        });

      // 8. Quét QR
      const qrModal = document.getElementById("qr-modal");
      let html5QrCode = null;

      document.getElementById("btn-scan-qr").addEventListener("click", () => {
        if ("speechSynthesis" in window) window.speechSynthesis.cancel(); // Ngắt giọng đọc khi mở camera
        qrModal.classList.remove("hidden");

        html5QrCode = new Html5Qrcode("qr-reader");
        html5QrCode
          .start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            onScanSuccess,
          )
          .catch(() => {
            Html5Qrcode.getCameras().then((devices) => {
              if (devices.length > 0)
                html5QrCode.start(
                  devices[0].id,
                  { fps: 10, qrbox: 250 },
                  onScanSuccess,
                );
            });
          });
      });

      function onScanSuccess(decodedText) {
        if (html5QrCode) {
          html5QrCode.stop().then(() => html5QrCode.clear());
        }
        qrModal.classList.add("hidden");

        const poiId = parseInt(decodedText);
        fetch(`/api/POI/${poiId}`, {
          method: "GET",
          headers: {
            "ngrok-skip-browser-warning": "true",
            Authorization: "Bearer " + localStorage.getItem("guestToken"),
          },
        })
          .then((res) => {
            if (!res.ok) throw new Error("Không tìm thấy địa điểm");
            return res.json();
          })
          .then((poiInfo) => renderPoiCard(poiInfo))
          .catch((err) => alert("Lỗi quét QR"));
      }

      document.getElementById("btn-close-qr").addEventListener("click", () => {
        if ("speechSynthesis" in window) window.speechSynthesis.cancel(); // Ngắt giọng đọc khi đóng camera
        if (html5QrCode) {
          html5QrCode.stop().then(() => html5QrCode.clear());
        }
        qrModal.classList.add("hidden");
      });
    </script>
  </body>
</html>
