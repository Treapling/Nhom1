<!doctype html>

          <button

          <a

      >

          <h1 class="text-lg md:text-2xl font-bold tracking-wide" id="ui-title">

          </h1>
          <div class="flex gap-2 items-center mt-1 md:mt-0">
            <select
              id="lang-switch"
              class="bg-red-800 text-white text-xs md:text-sm rounded px-2 py-1 md:py-1.5 outline-none border-none cursor-pointer"
            >
              <option value="vi">🇻🇳 Tiếng Việt</option>
              <option value="en">🇬🇧 English</option>
              <option value="zh">🇨🇳 中文</option>

            </select>

        </div>

        <div class="flex gap-1 md:gap-2 items-center flex-wrap justify-end">
          <button
            onclick="showBookmarks()"
            class="bg-pink-600 hover:bg-pink-700 px-2 py-1.5 md:px-3 rounded text-[10px] md:text-sm font-bold text-white transition shadow-sm"
          >
            ❤️ <span class="ui-nav-saved">Đã lưu</span>
          </button>

          <button
            onclick="endTour()"
            class="bg-red-800 hover:bg-red-900 px-2 py-1.5 md:px-3 rounded text-[10px] md:text-sm font-bold text-white transition shadow-sm"
            id="ui-end"
          >
            Kết thúc Tour
          </button>

          <button
            id="btn-scan-qr"
            class="bg-red-700 hover:bg-red-800 px-2 py-1.5 md:px-3 rounded text-[10px] md:text-sm font-bold text-white transition shadow-sm"
          >
            📷 <span id="ui-scan">Quét QR</span>
          </button>

          <button
            onclick="simulateGPS()"
            class="bg-yellow-500 hover:bg-yellow-600 px-2 py-1.5 md:px-3 rounded text-[10px] md:text-sm font-bold text-dark transition shadow-sm"
          >

        </div>
      </header>

        <div

              ...
            </p>

            <div

            </div>

            <div id="poi-menu-container" class="hidden mt-4">

          <button

            Đóng Camera

        class="hidden absolute inset-0 flex items-center justify-center p-4 bg-black bg-opacity-70"
        style="z-index: 10000"
      >

              placeholder="🔍 Tìm địa điểm..."

          </div>
        </div>
      </div>

      <div
        id="reviews-modal"
        class="hidden absolute inset-0 flex items-center justify-center p-4 bg-black bg-opacity-70"
        style="z-index: 10000"
      >
        <div
          class="bg-white w-full max-w-lg rounded-xl overflow-hidden flex flex-col max-h-[80vh]"
        >
          <div
            class="bg-yellow-500 px-4 md:px-5 py-3 text-gray-900 flex justify-between items-center shadow-sm"
          >
            <span class="font-bold text-base md:text-lg" id="ui-modal-reviews"
              >⭐ Đánh giá Khách hàng</span
            ><button
              onclick="
                document.getElementById('reviews-modal').classList.add('hidden')

              class="text-2xl font-bold hover:text-gray-700"
            >
              &times;
            </button>
          </div>

            class="p-0 overflow-y-auto flex-1 bg-gray-50"

          ></div>
        </div>

    <script>
      function parseJwt(token) {
        try {
          return JSON.parse(
            decodeURIComponent(
              window
                .atob(token.split(".")[1])
                .split("")
                .map(
                  (c) => "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2),
                )
                .join(""),
            ),
          );
        } catch (e) {
          return null;
        }
      }

      let currentRole = null,
        currentPoiId = null,
        currentPoiName = "",
        currentPoiData = null,
        timerInterval = null;

      let routingControl = null;
      let destMarker = null;

      let isAudioUnlocked = false;
      function unlockAudioContext() {
        if (isAudioUnlocked) return;
        const player = document.getElementById("audio-player");
        player.src =
          "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=";
        player
          .play()
          .then(() => {
            player.pause();
            isAudioUnlocked = true;
          })
          .catch(() => {});
      }
      document.body.addEventListener("click", unlockAudioContext);
      document.body.addEventListener("touchstart", unlockAudioContext);

      // DỊCH TỰ ĐỘNG BẰNG GOOGLE TRANSLATE
      async function translateText(text, targetLang) {
        if (!text || targetLang === "vi") return text;
        try {
          const res = await fetch(
            `https://translate.googleapis.com/translate_a/single?client=gtx&sl=vi&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`,
          );
          const data = await res.json();
          return data[0].map((x) => x[0]).join("");
        } catch (e) {
          console.error("Lỗi dịch:", e);
          return text;
        }
      }

      // QUY ĐỔI TIỀN TỆ
      function getCurrencyDisplay(vndPrice, lang) {
        if (lang === "vi") return "";
        const rates = {
          en: { rate: 25400, symbol: "$", isPrefix: true },
          zh: { rate: 3500, symbol: "¥", isPrefix: true },
          ja: { rate: 165, symbol: "¥", isPrefix: true },
          ko: { rate: 18.5, symbol: "₩", isPrefix: false },
        };
        const c = rates[lang];
        if (!c) return "";
        const converted = (vndPrice / c.rate).toFixed(1);
        return c.isPrefix
          ? `(≈ ${c.symbol}${converted})`
          : `(≈ ${converted}${c.symbol})`;
      }

      function updateUITexts(lang) {
        const t = dict[lang] || dict["vi"];
        if (document.getElementById("ui-nav-map"))
          document.getElementById("ui-nav-map").innerText = t.map;
        document
          .querySelectorAll(".ui-nav-saved, .class-ui-nav-saved")
          .forEach((el) => (el.innerText = t.saved));
        document.getElementById("ui-menu-title").innerText = t.menu;
        document.getElementById("ui-scan").innerText = t.scan;
        document.getElementById("ui-send").innerText = t.send;
        document.getElementById("ui-sim").innerText = t.sim;
        document.getElementById("ui-end").innerText = t.end;

        if (document.getElementById("ui-route"))
          document.getElementById("ui-route").innerText = t.route;
        if (document.getElementById("ui-reopen"))
          document.getElementById("ui-reopen").innerText = t.reopen;

        document.getElementById("ui-modal-saved").innerText = t.savedTitle;
        document.getElementById("ui-modal-reviews").innerText = t.reviews;
        document.getElementById("audio-error").innerText = t.errAudio;
        document.getElementById("review-comment").placeholder = t.req;
        document.getElementById("bookmarkSearch").placeholder =
          t.searchPlaceholder;

        if (currentPoiData) {
          document.getElementById("poi-rating").innerText =
            `${t.rating}: ${currentPoiData.ratingAvg}⭐ (${currentPoiData.ratingTotalCount})`;
          document.getElementById("poi-listens").innerText =
            `🎧 ${currentPoiData.listenCount} ${t.listen}`;
        }
        renderBookmarkList(
          JSON.parse(localStorage.getItem("bookmarkedPOIs")) || [],
        );
      }

      document
        .getElementById("lang-switch")
        .addEventListener("change", function () {
          updateUITexts(this.value);
          if (currentPoiData) {
            renderPoiCard(currentPoiData);
          }
        });

      document.addEventListener("DOMContentLoaded", () => {
        const token = localStorage.getItem("guestToken");
        if (token) {
          document.getElementById("activation-overlay").classList.add("hidden");
          const jwt = parseJwt(token);
          currentRole = jwt.role;
          setupRoleFeatures(jwt);
          setTimeout(() => {
            if (typeof map !== "undefined") map.invalidateSize();
          }, 500);
        }
      });

      function activateFree() {
        fetch("/api/Auth/guest-free", { method: "POST" })
          .then((r) => r.json())
          .then((data) => {
            localStorage.setItem("guestToken", data.token);
            window.location.reload();
          });
      }

      function endTour() {
        localStorage.clear();
        window.location.reload();
      }

      function setupRoleFeatures(jwt) {
        const badge = document.getElementById("status-badge");
        const t =
          dict[document.getElementById("lang-switch").value] || dict["vi"];

        if (currentRole === "GuestPremium") {
          badge.classList.remove("hidden");
          document.getElementById("review-comment").classList.remove("hidden");

          timerInterval = setInterval(() => {
            let now = Math.floor(Date.now() / 1000);
            let diff = jwt.exp - now;
            if (diff <= 0) {
              clearInterval(timerInterval);
              alert(t.expiredPrem);
              endTour();
            } else {
              let h = Math.floor(diff / 3600);
              let m = Math.floor((diff % 3600) / 60);
              badge.innerText = `⏳ ${h}h ${m}m`;
            }
          }, 1000);
        } else {
          badge.classList.add("hidden");
        }
      }

      const vinhKhanhCenter = [10.7619316, 106.7019412];
      const map = L.map("map", { zoomControl: false }).setView(
        vinhKhanhCenter,
        17,
      );
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(
        map,
      );
      setTimeout(() => map.invalidateSize(), 500);
      let userMarker = L.marker(vinhKhanhCenter)
        .addTo(map)
        .bindPopup("Vị trí của bạn")
        .openPopup();

      const vkPath = [
        [10.7619316, 106.7019412],
        [10.7617852, 106.7021558],
        [10.7616287, 106.702367],
        [10.761494, 106.7025856],
        [10.7612747, 106.7027786],
        [10.7610791, 106.7029963],
        [10.7609054, 106.7032261],
        [10.7607134, 106.7034474],
        [10.7605669, 106.7037068],
        [10.7605815, 106.7040004],
        [10.7606934, 106.7042746],
        [10.7608311, 106.7045403],
        [10.7609803, 106.7048024],
        [10.7611314, 106.7050905],
        [10.7612405, 106.7053693],
        [10.7612788, 106.7056703],
        [10.7612214, 106.7059333],
        [10.7610831, 106.7061797],
        [10.7609412, 106.706427],
        [10.7608033, 106.7066794],
      ];
      let simIndex = 0,
        lastCheckTime = 0,
        lastPlayedPoiId = null;

      function simulateGPS() {
        unlockAudioContext();
        if (simIndex >= vkPath.length) simIndex = 0;
        const pos = vkPath[simIndex];
        const newLatLng = new L.LatLng(pos[0], pos[1]);
        userMarker.setLatLng(newLatLng);
        map.panTo(newLatLng);
        simIndex++;

        if (routingControl && currentPoiData) {
          routingControl.setWaypoints([
            newLatLng,
            L.latLng(currentPoiData.lat, currentPoiData.lng),
          ]);
        }

        if (Date.now() - lastCheckTime > 4000) {
          lastCheckTime = Date.now();
          fetch(`/api/location/check?lat=${pos[0]}&lng=${pos[1]}`, {
            headers: {
              Authorization: "Bearer " + localStorage.getItem("guestToken"),
            },
          })
            .then((r) => r.json())
            .then((data) => {
              if (data.triggered === true && data.poi.id !== lastPlayedPoiId) {
                lastPlayedPoiId = data.poi.id;
                fetchPOIAndRender(data.poi.id);
              }
            })
            .catch(() => {});
        }
      }

      function drawRouteToPOI() {
        if (!currentPoiData || !userMarker) {
          alert("Đang xác định vị trí, vui lòng chờ...");
          return;
        }

        const userPos = userMarker.getLatLng();
        const destPos = L.latLng(currentPoiData.lat, currentPoiData.lng);

        if (routingControl != null) map.removeControl(routingControl);
        if (destMarker != null) map.removeLayer(destMarker);

        destMarker = L.marker(destPos).addTo(map);

        routingControl = L.Routing.control({
          waypoints: [userPos, destPos],
          routeWhileDragging: false,
          addWaypoints: false,
          show: false,
          lineOptions: {
            styles: [{ color: "#2563eb", opacity: 0.8, weight: 6 }],
          },
          createMarker: function () {
            return null;
          },
        }).addTo(map);

        routingControl.on("routesfound", function (e) {
          const distanceMeters = e.routes[0].summary.totalDistance;
          const distText =
            distanceMeters >= 1000
              ? (distanceMeters / 1000).toFixed(2) + " km"
              : Math.round(distanceMeters) + " m";

          destMarker
            .bindPopup(
              `
                <div style="text-align: center; min-width: 120px;">
                    <strong style="color: #dc2626; font-size: 14px;">${currentPoiData.name}</strong><br/>
                    <span style="font-size: 13px; color: #374151;">Đường đi: <b style="color: #15803d;">${distText}</b></span>
                </div>
            `,
            )
            .openPopup();
        });

        map.fitBounds(L.latLngBounds(userPos, destPos), { padding: [50, 50] });
      }

      function fetchPOIAndRender(poiId) {
        fetch(`/api/POI/${poiId}`, {
          headers: {
            Authorization: "Bearer " + localStorage.getItem("guestToken"),
          },
        }).then(async (res) => {
          const data = await res.json();
          if (!res.ok) return;

          if (routingControl != null && currentPoiId !== poiId) {
            map.removeControl(routingControl);
            if (destMarker != null) map.removeLayer(destMarker);
            routingControl = null;
            destMarker = null;
          }

          renderPoiCard(data);
        });
      }

      async function renderPoiCard(poiInfo) {
        currentPoiId = poiInfo.id;
        currentPoiName = poiInfo.name;
        currentPoiData = poiInfo;

        document.getElementById("poi-card").classList.remove("hidden");
        document.getElementById("mini-reopen-btn").classList.add("hidden");

        const lang = document.getElementById("lang-switch").value;

        document.getElementById("poi-name").innerText =
          "Đang dịch / Translating...";
        document.getElementById("poi-name").innerText = await translateText(
          poiInfo.name,
          lang,
        );

        updateUITexts(lang);

        const fallbackDesc =
          poiInfo.descriptions && poiInfo.descriptions["vi"]
            ? poiInfo.descriptions["vi"]
            : poiInfo.description;
        document.getElementById("poi-desc").innerText =
          "Đang dịch mô tả / Translating description...";
        document.getElementById("poi-desc").innerText = await translateText(
          fallbackDesc,
          lang,
        );

        fetchAndRenderMenu(poiInfo.id, lang);
        playAudioForRole(lang);
      }

      function playAudioForRole(lang) {
        const player = document.getElementById("audio-player"),
          err = document.getElementById("audio-error");
        player.pause();
        if (currentPoiData && currentPoiData.audios) {
          let audioList = currentPoiData.audios.filter(
            (a) => a.language === lang,
          );
          let matched =
            currentRole === "GuestPremium"
              ? audioList.find((a) => a.isPremium) ||
                audioList.find((a) => !a.isPremium)
              : audioList.find((a) => !a.isPremium);

          if (matched) {
            player.src = matched.filePath;
            player.style.display = "block";
            err.classList.add("hidden");
            player.play().catch((e) => console.log("Autoplay bị chặn:", e));
          } else {
            player.style.display = "none";
            err.classList.remove("hidden");
          }
        }
      }

      function fetchAndRenderMenu(poiId, lang) {
        const container = document.getElementById("poi-menu-container"),
          list = document.getElementById("poi-menu-list");

        list.innerHTML =
          "<p class='text-gray-500 text-sm italic'>Đang dịch thực đơn / Translating menu...</p>";
        container.classList.remove("hidden");

        fetch(`/api/Menu/poi/${poiId}`, {
          headers: {
            Authorization: "Bearer " + localStorage.getItem("guestToken"),
          },
        })
          .then((r) => r.json())
          .then(async (menus) => {
            if (menus.length > 0) {
              let menuHtml = "";
              for (let m of menus) {
                let translatedName = await translateText(m.itemName, lang);
                let currencyStr = getCurrencyDisplay(m.price, lang);

                menuHtml += `
                        <div class="flex justify-between items-center py-2 md:py-3 border-b border-red-100 last:border-0">
                            <span class="md:text-lg text-gray-800 font-medium">${translatedName}</span>
                            <div class="text-right">
                                <span class="font-bold text-red-600 md:text-lg block leading-none">${m.price.toLocaleString("vi-VN")}đ</span>
                                <span class="text-xs text-gray-400 fw-bold">${currencyStr}</span>
                            </div>
                        </div>`;
              }
              list.innerHTML = menuHtml;
            } else {
              container.classList.add("hidden");
            }
          });
      }

      function submitReview() {
        if (!currentPoiId) return;
        fetch("/api/Review", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + localStorage.getItem("guestToken"),
          },
          body: JSON.stringify({
            POI_Id: currentPoiId,
            Rating: parseInt(document.getElementById("rating-select").value),
            Comment: document.getElementById("review-comment").value,
          }),
        }).then((res) => {
          if (res.ok) {
            alert("Gửi thành công!");
            document.getElementById("review-comment").value = "";
            fetchPOIAndRender(currentPoiId);
          }
        });
      }

      function showReviews() {
        if (currentRole !== "GuestPremium") {
          alert("Chỉ thành viên Premium mới có thể xem bình luận chi tiết!");
          return;
        }
        document.getElementById("reviews-modal").classList.remove("hidden");
        fetch(`/api/Review/poi/${currentPoiId}`, {
          headers: {
            Authorization: "Bearer " + localStorage.getItem("guestToken"),
          },
        })
          .then((r) => r.json())
          .then((data) => {
            const list = document.getElementById("reviews-list-container");
            if (data.length === 0)
              list.innerHTML =
                "<p class='p-4 md:p-6 text-center text-gray-500 md:text-lg'>Chưa có bình luận nào.</p>";
            else
              list.innerHTML = data
                .map(
                  (r) =>
                    `<div class="p-3 md:p-4 border-b border-gray-200"><span class="font-bold text-yellow-600 md:text-lg">${"⭐".repeat(r.rating)}</span><p class="text-sm md:text-base mt-1 text-gray-800">"${r.comment}"</p><small class="text-xs md:text-sm text-gray-400 mt-2 block">${new Date(r.createdAt).toLocaleDateString("vi-VN")}</small></div>`,
                )
                .join("");
          });
      }

      function toggleBookmark() {
        const t =
          dict[document.getElementById("lang-switch").value] || dict["vi"];
        let b = JSON.parse(localStorage.getItem("bookmarkedPOIs")) || [];
        if (!b.find((x) => x.id === currentPoiId)) {
          b.push({ id: currentPoiId, name: currentPoiName });
          alert(t.savedSuccess);
        } else alert(t.alreadySaved);
        localStorage.setItem("bookmarkedPOIs", JSON.stringify(b));
        renderBookmarkList(b);
      }
      function showBookmarks() {
        renderBookmarkList(
          JSON.parse(localStorage.getItem("bookmarkedPOIs")) || [],
        );
        document.getElementById("bookmark-modal").classList.remove("hidden");
      }
      function searchBookmarks() {
        renderBookmarkList(
          (JSON.parse(localStorage.getItem("bookmarkedPOIs")) || []).filter(
            (b) =>
              b.name
                .toLowerCase()
                .includes(
                  document.getElementById("bookmarkSearch").value.toLowerCase(),
                ),
          ),
        );
      }
      function removeBookmark(id) {
        localStorage.setItem(
          "bookmarkedPOIs",
          JSON.stringify(
            (JSON.parse(localStorage.getItem("bookmarkedPOIs")) || []).filter(
              (b) => b.id !== id,
            ),
          ),
        );
        searchBookmarks();
      }
      function renderBookmarkList(data) {
        const t =
          dict[document.getElementById("lang-switch").value] || dict["vi"];
        document.getElementById("bookmark-list").innerHTML =
          data.length === 0
            ? `<p class='p-4 md:p-6 text-center text-gray-500'>${t.empty}</p>`
            : data
                .map(
                  (b) =>
                    `<li class="p-3 md:p-4 flex justify-between bg-white border-b items-center"><span class="text-sm md:text-base font-bold">${b.name}</span><button onclick="removeBookmark(${b.id})" class="text-red-500 md:text-base text-xs px-3 py-1 rounded-lg bg-red-50 font-bold hover:bg-red-100 transition">${t.delete}</button></li>`,
                )
                .join("");
      }

      const qrModal = document.getElementById("qr-modal");
      let html5QrCode = null;
      document.getElementById("btn-scan-qr").addEventListener("click", () => {
        unlockAudioContext();
        qrModal.classList.remove("hidden");
        html5QrCode = new Html5Qrcode("qr-reader");
        html5QrCode
          .start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            (text) => {
              html5QrCode.stop();
              qrModal.classList.add("hidden");
              lastPlayedPoiId = parseInt(text);
              fetchPOIAndRender(lastPlayedPoiId);
            },
          )
          .catch(() => {});
      });
      document.getElementById("btn-close-qr").addEventListener("click", () => {
        if (html5QrCode) html5QrCode.stop();
        qrModal.classList.add("hidden");
      });

      function closePoiCard() {
        document.getElementById("poi-card").classList.add("hidden");
        document.getElementById("mini-reopen-btn").classList.remove("hidden");
      }

      function reopenPoiCard() {
        document.getElementById("poi-card").classList.remove("hidden");
        document.getElementById("mini-reopen-btn").classList.add("hidden");
      }
    </script>
  </body>
</html>
