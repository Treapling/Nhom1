<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thanh Toán Nâng Cấp - SGU Tour Guide</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"
      rel="stylesheet"
    />
  </head>
  <body
    class="bg-gray-100 font-sans antialiased flex items-center justify-center min-h-screen p-4"
  >
    <div class="bg-white max-w-md w-full rounded-2xl shadow-xl overflow-hidden">
      <div class="bg-yellow-500 px-6 py-4 text-gray-900 text-center shadow-sm">
        <h2 class="text-2xl font-extrabold">⭐ Nâng cấp Slot Địa Điểm</h2>
      </div>

      <div class="p-6">
        <p class="text-gray-600 text-center mb-6 font-medium">
          Mở rộng quy mô kinh doanh của bạn. Quét mã QR MoMo dưới đây để thanh
          toán mua thêm
          <strong class="text-green-600">1 Slot đăng ký quán</strong>.
        </p>

        <div class="flex justify-center mb-6">
          <div
            class="border-2 border-dashed border-yellow-400 p-4 rounded-xl text-center bg-yellow-50"
          >
            <img
              src="https://upload.wikimedia.org/wikipedia/commons/d/d0/QR_code_for_mobile_English_Wikipedia.svg"
              alt="QR MoMo"
              class="w-48 h-48 mb-3 rounded-lg mx-auto shadow-sm"
            />
            <p class="font-black text-xl text-gray-800">50.000 VNĐ</p>
            <p class="text-xs text-gray-500 mt-1">
              Nội dung CK: <span class="font-bold text-red-500">MUA SLOT</span>
            </p>
          </div>
        </div>

        <button
          id="btnConfirm"
          onclick="confirmPayment()"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl shadow-md transition-colors mb-3"
        >
          Xác nhận đã chuyển khoản
        </button>
        <a
          href="vendor.html"
          class="block w-full text-center text-gray-500 hover:text-gray-700 font-medium py-2 transition-colors"
        >
          Quay lại Bảng điều khiển
        </a>
      </div>
    </div>

    <script>
      // Bảo vệ trang: Phải là Vendor mới được vào
      const token = sessionStorage.getItem("adminToken");
      if (!token) window.location.href = "admin.html";

      function confirmPayment() {
        const btn = document.getElementById("btnConfirm");
        btn.innerText = "Đang xử lý...";
        btn.disabled = true;

        // Gọi API lên Backend để cộng Slot
        fetch("/api/User/buy-slot", {
          method: "POST",
          headers: {
            Authorization: "Bearer " + token,
            "ngrok-skip-browser-warning": "true",
          },
        })
          .then(async (res) => {
            const data = await res.json();
            if (res.ok) {
              alert(data.message); // Báo thành công
              window.location.href = "vendor.html"; // Trả về trang chủ Vendor
            } else {
              alert("Đã xảy ra lỗi hệ thống.");
              btn.innerText = "Xác nhận đã chuyển khoản";
              btn.disabled = false;
            }
          })
          .catch((err) => {
            alert("Lỗi kết nối mạng!");
            btn.innerText = "Xác nhận đã chuyển khoản";
            btn.disabled = false;
          });
      }
    </script>
  </body>
</html>
