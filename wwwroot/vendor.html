<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kênh Chủ Cửa Hàng (Vendor) - SGU Tour Guide</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body style="background-color: #f4f6f9">
    <nav class="navbar navbar-expand-lg mb-4" style="background-color: #198754">
      <div class="container-fluid">
        <a class="navbar-brand text-white fw-bold" href="#"
          >🏪 Quản lý Gian hàng (Vendor)</a
        >
        <button onclick="logout()" class="btn btn-sm btn-light">
          Đăng xuất
        </button>
      </div>
    </nav>

    <div class="container">
      <div class="row">
        <div class="col-md-4">
          <div class="card p-3 mb-4 shadow-sm border-0">
            <h5>Thêm Audio Thuyết minh</h5>
            <hr />
            <form id="audioForm">
              <div class="mb-2">
                <label class="form-label">Mã địa điểm (POI ID)</label>
                <input
                  type="number"
                  class="form-control"
                  id="audioPoiId"
                  required
                />
              </div>
              <div class="mb-2">
                <label class="form-label">Link Audio (.mp3)</label>
                <input
                  type="text"
                  class="form-control"
                  id="audioFilePath"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Ngôn ngữ</label>
                <select class="form-select" id="audioLanguage">
                  <option value="vi">Tiếng Việt</option>
                  <option value="en">Tiếng Anh</option>
                </select>
              </div>
              <button type="submit" class="btn btn-success w-100">
                Lưu Audio
              </button>
            </form>
          </div>

          <div class="card p-3 mb-4 shadow-sm border-0">
            <h5>Thêm Món Ăn (Menu)</h5>
            <hr />
            <form id="menuForm">
              <div class="mb-2">
                <label class="form-label">Mã địa điểm (POI ID)</label>
                <input
                  type="number"
                  class="form-control"
                  id="menuPoiId"
                  required
                />
              </div>
              <div class="mb-2">
                <label class="form-label">Tên món</label>
                <input
                  type="text"
                  class="form-control"
                  id="menuItemName"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Giá tiền (VNĐ)</label>
                <input
                  type="number"
                  class="form-control"
                  id="menuPrice"
                  required
                />
              </div>
              <button type="submit" class="btn btn-warning w-100 fw-bold">
                Lưu Món Ăn
              </button>
            </form>
          </div>
        </div>

        <div class="col-md-8">
          <div class="card p-3 mb-4 shadow-sm border-0">
            <h5>Danh sách Địa điểm của bạn</h5>
            <hr />
            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead class="table-dark">
                  <tr>
                    <th>ID</th>
                    <th>Tên gian hàng / Địa điểm</th>
                    <th>Lượt khách</th>
                  </tr>
                </thead>
                <tbody id="poiTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const token = sessionStorage.getItem("adminToken");
      if (!token) {
        window.location.href = "admin.html";
      } else {
        try {
          const payload = JSON.parse(atob(token.split(".")[1]));
          if (payload.role !== "Vendor") {
            window.location.href = "admin.html";
          }
        } catch (e) {
          window.location.href = "admin.html";
        }
      }

      function logout() {
        sessionStorage.removeItem("adminToken");
        window.location.href = "admin.html";
      }

      function loadVendorPOIs() {
        fetch("/api/POI/vendor", {
          headers: {
            Authorization: "Bearer " + token,
            "ngrok-skip-browser-warning": "true",
          },
        })
          .then((res) => res.json())
          .then((data) => {
            const tbody = document.getElementById("poiTableBody");
            tbody.innerHTML = "";
            data.forEach((poi) => {
              tbody.innerHTML += `<tr>
                    <td>${poi.id}</td>
                    <td><strong>${poi.name}</strong></td>
                    <td><span class="badge bg-info text-dark">🎧 ${poi.listenCount} lượt</span></td>
                </tr>`;
            });
          })
          .catch((err) => console.error(err));
      }

      document
        .getElementById("audioForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const newAudio = {
            POI_Id: parseInt(document.getElementById("audioPoiId").value),
            filePath: document.getElementById("audioFilePath").value,
            language: document.getElementById("audioLanguage").value,
          };
          fetch("/api/Audio", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + token,
              "ngrok-skip-browser-warning": "true",
            },
            body: JSON.stringify(newAudio),
          }).then((res) => {
            if (res.ok) {
              alert("Thêm Audio thành công!");
              document.getElementById("audioForm").reset();
            } else {
              res.text().then((t) => alert("Lỗi: " + t));
            }
          });
        });

      document
        .getElementById("menuForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const newMenu = {
            POI_Id: parseInt(document.getElementById("menuPoiId").value),
            ItemName: document.getElementById("menuItemName").value,
            Price: parseFloat(document.getElementById("menuPrice").value),
            Description: "",
          };
          fetch("/api/Menu", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + token,
              "ngrok-skip-browser-warning": "true",
            },
            body: JSON.stringify(newMenu),
          }).then((res) => {
            if (res.ok) {
              alert("Thêm món ăn thành công!");
              document.getElementById("menuForm").reset();
            } else {
              res.text().then((t) => alert("Lỗi: " + t));
            }
          });
        });

      window.addEventListener("DOMContentLoaded", loadVendorPOIs);
    </script>
  </body>
</html>
